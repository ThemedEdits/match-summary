<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CricSnap — Cricket Summary Generator</title>
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Teko:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-bg">
    <div class="pitch-lines"></div>
    <div class="auth-container">
      <div class="brand">
        <div class="brand-icon">🏏</div>
        <h1 class="brand-name">CricSnap</h1>
        <p class="brand-tagline">Professional Cricket Summaries in Seconds</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
          </div>
          <button class="btn-primary" onclick="loginWithEmail()">Sign In</button>
          <div class="divider"><span>or</span></div>
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
          </button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="auth-form hidden">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Your name" />
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" />
          </div>
          <button class="btn-primary" onclick="signupWithEmail()">Create Account</button>
          <div class="divider"><span>or</span></div>
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
          </button>
        </div>

        <div id="authError" class="auth-error hidden"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
      document.getElementById('authError').classList.add('hidden');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Templates — CricSnap</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/templates.css" />
  <link rel="stylesheet" href="../css/dropdown.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Teko:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><i data-lucide="activity"></i><span>CricSnap</span></div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="templates.html" class="nav-link active"><i data-lucide="layout-template"></i> Templates</a>
      <a href="generate.html" class="nav-link"><i data-lucide="sparkles"></i> Generate</a>
    </div>
    <div class="nav-user">
      <span id="userNameDisplay"></span>
      <button class="btn-logout" onclick="logoutUser()"><i data-lucide="log-out"></i> Sign Out</button>
    </div>
  </nav>

  <main class="page-main">
    <div class="page-header reveal">
      <div>
        <h1>Templates</h1>
        <p>Upload background images and define where data fields appear</p>
      </div>
      <button class="btn-primary" onclick="openUploadModal()"><i data-lucide="plus"></i> New Template</button>
    </div>
    <div id="templateGrid" class="template-grid"></div>
  </main>

  <!-- Upload / Edit Modal -->
  <div id="uploadModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">New Template</h2>
        <button class="modal-close" onclick="closeUploadModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-two-col">
          <!-- Left: settings -->
          <div class="modal-left">
            <div class="input-group">
              <label>Template Name</label>
              <input type="text" id="templateName" placeholder="e.g. League Match Card" />
            </div>

            <div class="upload-zone compact" id="templateUploadZone" onclick="document.getElementById('templateImageInput').click()">
              <input type="file" id="templateImageInput" accept="image/*" style="display:none" onchange="handleTemplateImageSelect(event)" />
              <i data-lucide="image-up"></i>
              <span>Upload background image</span>
            </div>

            <!-- Field type panel (shown when box selected) -->
            <div id="fieldTypePanel" class="field-type-panel hidden">
              <div class="section-label"><i data-lucide="settings-2"></i> Selected Field</div>

              <div class="input-group">
                <label>Field Type</label>
                <select id="fieldTypeSelect">
                  <option value="">-- Select Type --</option>
                  <optgroup label="Match Info">
                    <option value="match_title">Match Title / Series Name</option>
                    <option value="match_date">Match Date</option>
                    <option value="match_venue">Venue</option>
                    <option value="match_result">Match Result</option>
                    <option value="man_of_match">Man of the Match</option>
                    <option value="toss_result">Toss Result</option>
                  </optgroup>
                  <optgroup label="1st Innings">
                    <option value="team1_name">Team 1 Name</option>
                    <option value="team1_score">Team 1 Score</option>
                    <option value="team1_overs">Team 1 Overs</option>
                    <option value="team1_batter1_name">T1 Batter 1 Name</option>
                    <option value="team1_batter1_runs">T1 Batter 1 Runs</option>
                    <option value="team1_batter1_balls">T1 Batter 1 Balls</option>
                    <option value="team1_batter2_name">T1 Batter 2 Name</option>
                    <option value="team1_batter2_runs">T1 Batter 2 Runs</option>
                    <option value="team1_batter2_balls">T1 Batter 2 Balls</option>
                    <option value="team1_batter3_name">T1 Batter 3 Name</option>
                    <option value="team1_batter3_runs">T1 Batter 3 Runs</option>
                    <option value="team1_batter3_balls">T1 Batter 3 Balls</option>
                    <option value="team1_bowler1_name">T1 Bowler 1 Name</option>
                    <option value="team1_bowler1_wickets">T1 Bowler 1 Wickets</option>
                    <option value="team1_bowler1_runs">T1 Bowler 1 Runs</option>
                    <option value="team1_bowler1_overs">T1 Bowler 1 Overs</option>
                    <option value="team1_bowler2_name">T1 Bowler 2 Name</option>
                    <option value="team1_bowler2_wickets">T1 Bowler 2 Wickets</option>
                    <option value="team1_bowler2_runs">T1 Bowler 2 Runs</option>
                    <option value="team1_bowler2_overs">T1 Bowler 2 Overs</option>
                    <option value="team1_bowler3_name">T1 Bowler 3 Name</option>
                    <option value="team1_bowler3_wickets">T1 Bowler 3 Wickets</option>
                    <option value="team1_bowler3_runs">T1 Bowler 3 Runs</option>
                    <option value="team1_bowler3_overs">T1 Bowler 3 Overs</option>
                  </optgroup>
                  <optgroup label="2nd Innings">
                    <option value="team2_name">Team 2 Name</option>
                    <option value="team2_score">Team 2 Score</option>
                    <option value="team2_overs">Team 2 Overs</option>
                    <option value="team2_batter1_name">T2 Batter 1 Name</option>
                    <option value="team2_batter1_runs">T2 Batter 1 Runs</option>
                    <option value="team2_batter1_balls">T2 Batter 1 Balls</option>
                    <option value="team2_batter2_name">T2 Batter 2 Name</option>
                    <option value="team2_batter2_runs">T2 Batter 2 Runs</option>
                    <option value="team2_batter2_balls">T2 Batter 2 Balls</option>
                    <option value="team2_batter3_name">T2 Batter 3 Name</option>
                    <option value="team2_batter3_runs">T2 Batter 3 Runs</option>
                    <option value="team2_batter3_balls">T2 Batter 3 Balls</option>
                    <option value="team2_bowler1_name">T2 Bowler 1 Name</option>
                    <option value="team2_bowler1_wickets">T2 Bowler 1 Wickets</option>
                    <option value="team2_bowler1_runs">T2 Bowler 1 Runs</option>
                    <option value="team2_bowler1_overs">T2 Bowler 1 Overs</option>
                    <option value="team2_bowler2_name">T2 Bowler 2 Name</option>
                    <option value="team2_bowler2_wickets">T2 Bowler 2 Wickets</option>
                    <option value="team2_bowler2_runs">T2 Bowler 2 Runs</option>
                    <option value="team2_bowler2_overs">T2 Bowler 2 Overs</option>
                    <option value="team2_bowler3_name">T2 Bowler 3 Name</option>
                    <option value="team2_bowler3_wickets">T2 Bowler 3 Wickets</option>
                    <option value="team2_bowler3_runs">T2 Bowler 3 Runs</option>
                    <option value="team2_bowler3_overs">T2 Bowler 3 Overs</option>
                  </optgroup>
                </select>
              </div>

              <div class="field-style-row">
                <div class="input-group">
                  <label>Font</label>
                  <select id="fieldFontFamily">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Teko">Teko</option>
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Impact">Impact</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>Size (px)</label>
                  <input type="number" id="fieldFontSize" value="16" min="6" max="120" onchange="setFieldFontSize(this.value)" />
                </div>
              </div>

              <div class="field-style-row">
                <div class="input-group">
                  <label>Weight</label>
                  <select id="fieldFontWeight">
                    <option value="300">Light</option>
                    <option value="400">Normal</option>
                    <option value="600" selected>Semi-Bold</option>
                    <option value="700">Bold</option>
                    <option value="800">Extra Bold</option>
                    <option value="900">Black</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>Align</label>
                  <select id="fieldTextAlign">
                    <option value="left">Left</option>
                    <option value="center" selected>Center</option>
                    <option value="right">Right</option>
                  </select>
                </div>
              </div>

              <div class="input-group">
                <label>Text Color</label>
                <div class="color-row">
                  <input type="color" id="fieldColor" value="#ffffff" onchange="setFieldColor(this.value)" />
                  <input type="text" id="fieldColorHex" value="#ffffff" oninput="setFieldColorFromHex(this.value)" placeholder="#ffffff" />
                </div>
              </div>
            </div>

            <div class="fields-list" id="fieldsList"></div>
          </div>

          <!-- Right: canvas -->
          <div class="modal-right">
            <div id="fieldEditorWrap" class="field-editor-wrap hidden">
              <div class="canvas-toolbar">
                <button class="btn-sm" onclick="addField()"><i data-lucide="plus"></i> Add Field</button>
                <button class="btn-sm danger" onclick="deleteSelectedField()"><i data-lucide="trash-2"></i> Delete</button>
                <span class="canvas-hint">Drag to move · corners to resize</span>
              </div>
              <div class="canvas-wrapper">
                <div id="fieldCanvas" class="field-canvas">
                  <img id="canvasImg" />
                </div>
              </div>
            </div>
            <div id="canvasPlaceholder" class="canvas-placeholder">
              <i data-lucide="image"></i>
              <p>Upload a background image to start placing fields</p>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeUploadModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTemplate()" id="saveTemplateBtn" disabled>
          <i data-lucide="save"></i> Save Template
        </button>
      </div>
    </div>
  </div>

  <script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
  <script type="module" src="../js/dropdown.js"></script>
  <script type="module" src="../js/templates.js"></script>
</body>
</html>
